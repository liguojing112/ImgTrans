name: M4 desktop release build

on:
  push:
    paths:
      - ".github/workflows/m4-desktop-release-build.yml"
      - "packaging/**"
      - "scripts/build_desktop.py"
      - "scripts/verify_desktop_artifact.py"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    paths:
      - ".github/workflows/m4-desktop-release-build.yml"
      - "packaging/**"
      - "scripts/build_desktop.py"
      - "scripts/verify_desktop_artifact.py"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: m4-desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-x64:
    name: Test and build Windows x64
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: x64
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Confirm Windows x64 runner
        shell: pwsh
        run: |
          python -c "import platform; print(platform.platform(), platform.machine()); assert platform.machine().lower() in {'amd64', 'x86_64'}"

      - name: Install locked product and release dependencies
        run: python -m pip install -e ".[test,server,release]"

      - name: Run complete automated test suite
        run: python -m pytest -q

      - name: Build Windows x64 application
        run: python -m scripts.build_desktop --target windows-x64

      - name: Verify Windows x64 application
        run: python -m scripts.verify_desktop_artifact --target windows-x64

      - name: Archive verified Windows application
        shell: pwsh
        run: >-
          Compress-Archive
          -Path dist/release/windows-x64/ImgTrans
          -DestinationPath dist/release/ImgTrans-windows-x64.zip

      - name: Upload Windows application
        uses: actions/upload-artifact@v4
        with:
          name: imgtrans-windows-x64-run${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: dist/release/ImgTrans-windows-x64.zip

  macos-arm64:
    name: Test and build macOS arm64
    runs-on: macos-14
    timeout-minutes: 60
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Confirm Apple Silicon runner
        run: |
          python - <<'PY'
          import platform
          machine = platform.machine().lower()
          print(platform.platform(), machine)
          if machine not in {"arm64", "aarch64"}:
              raise SystemExit(f"expected Apple Silicon arm64 runner, got {machine}")
          PY

      - name: Install locked product and release dependencies
        run: python -m pip install -e ".[test,server,release]"

      - name: Run complete automated test suite
        run: python -m pytest -q

      - name: Build macOS arm64 application
        run: python -m scripts.build_desktop --target macos-arm64

      - name: Verify macOS arm64 application
        run: python -m scripts.verify_desktop_artifact --target macos-arm64

      - name: Verify ad-hoc application signature
        run: codesign --verify --deep --strict --verbose=2 dist/release/macos-arm64/ImgTrans.app

      - name: Archive verified macOS application
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          dist/release/macos-arm64/ImgTrans.app
          dist/release/ImgTrans-macos-arm64.zip

      - name: Upload macOS application
        uses: actions/upload-artifact@v4
        with:
          name: imgtrans-macos-arm64-run${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: dist/release/ImgTrans-macos-arm64.zip

