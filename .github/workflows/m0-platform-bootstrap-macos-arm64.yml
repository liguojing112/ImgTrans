name: M0 platform bootstrap macOS arm64

on:
  push:
    paths:
      - ".github/workflows/m0-platform-bootstrap-macos-arm64.yml"
      - "prototypes/platform_bootstrap/**"
      - "tests/prototypes/platform_bootstrap/**"
  pull_request:
    paths:
      - ".github/workflows/m0-platform-bootstrap-macos-arm64.yml"
      - "prototypes/platform_bootstrap/**"
      - "tests/prototypes/platform_bootstrap/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: m0-platform-bootstrap-macos-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build macOS arm64
    runs-on: macos-14
    timeout-minutes: 45
    env:
      MACOSX_DEPLOYMENT_TARGET: "13.0"
      QT_QPA_PLATFORM: offscreen
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prototypes/platform_bootstrap/requirements.lock

      - name: Confirm Apple Silicon runner
        run: |
          python - <<'PY'
          import platform
          machine = platform.machine().lower()
          print(f"machine={machine}")
          if machine not in {"arm64", "aarch64"}:
              raise SystemExit(f"expected Apple Silicon arm64 runner, got {machine}")
          PY

      - name: Install locked prototype dependencies
        run: python -m pip install -r prototypes/platform_bootstrap/requirements.lock

      - name: Run platform prototype tests
        run: python -m pytest tests/prototypes/platform_bootstrap -q

      - name: Probe native dependencies
        run: >-
          python prototypes/platform_bootstrap/dependency_probe.py
          --output prototypes/platform_bootstrap/results/macos-arm64-dependencies.json
          --strict

      - name: Build macOS arm64 application
        run: python prototypes/platform_bootstrap/build.py --target macos-arm64

      - name: Verify macOS arm64 artifact
        run: python prototypes/platform_bootstrap/verify_artifact.py --target macos-arm64

      - name: Verify ad-hoc code signature
        run: >-
          codesign --verify --deep --strict --verbose=2
          prototypes/platform_bootstrap/dist/macos-arm64/PlatformBootstrap-macos-arm64.app

      - name: Archive application bundle
        run: >-
          ditto -c -k --sequesterRsrc --keepParent
          prototypes/platform_bootstrap/dist/macos-arm64/PlatformBootstrap-macos-arm64.app
          prototypes/platform_bootstrap/dist/macos-arm64/PlatformBootstrap-macos-arm64.zip

      - name: Upload application and verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-bootstrap-macos-arm64-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            prototypes/platform_bootstrap/dist/macos-arm64/PlatformBootstrap-macos-arm64.zip
            prototypes/platform_bootstrap/results/macos-arm64*.json
