name: M0 Complex Layout macOS arm64

on:
  push:
    paths:
      - ".github/workflows/m0-complex-layout-macos-arm64.yml"
      - "prototypes/complex_script_layout/**"
      - "tests/prototypes/complex_script_layout/**"
  pull_request:
    paths:
      - ".github/workflows/m0-complex-layout-macos-arm64.yml"
      - "prototypes/complex_script_layout/**"
      - "tests/prototypes/complex_script_layout/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: m0-complex-layout-macos-arm64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-runtime:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: offscreen
      M0_COMPLEX_FONT_DIR: artifacts/m0/complex-layout/macos-arm64/fonts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prototypes/complex_script_layout/requirements.lock

      - name: Assert Apple Silicon runner
        run: |
          python - <<'PY'
          import platform
          machine = platform.machine().lower()
          if machine not in {"arm64", "aarch64"}:
              raise SystemExit(f"Expected arm64 runner, got {machine}")
          print(platform.platform())
          PY

      - name: Install locked prototype dependencies
        run: python -m pip install -r prototypes/complex_script_layout/requirements.lock

      - name: Download and verify pinned OFL fonts
        run: |
          python prototypes/complex_script_layout/prepare_fonts.py \
            --output artifacts/m0/complex-layout/macos-arm64/fonts

      - name: Run prototype tests
        run: python -m pytest tests/prototypes/complex_script_layout -q

      - name: Render all 120 cases with both backends
        run: |
          python prototypes/complex_script_layout/run.py \
            --cases tests/prototypes/complex_script_layout/fixtures/cases.json \
            --output artifacts/m0/complex-layout/macos-arm64 \
            --fonts artifacts/m0/complex-layout/macos-arm64/fonts

      - name: Compare layout backends
        run: |
          python prototypes/complex_script_layout/compare.py \
            --results artifacts/m0/complex-layout/macos-arm64

      - name: Verify macOS runtime evidence
        run: |
          python prototypes/complex_script_layout/verify_runtime_evidence.py \
            --candidate artifacts/m0/complex-layout/macos-arm64 \
            --expected-machine arm64 \
            --output artifacts/m0/complex-layout/macos-arm64/runtime-evidence.json

      - name: Upload layout evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m0-complex-layout-macos-arm64
          path: artifacts/m0/complex-layout/macos-arm64
          if-no-files-found: error
          retention-days: 14
